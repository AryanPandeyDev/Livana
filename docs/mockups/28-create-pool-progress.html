<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Livana · Publishing your cause</title>
    <link rel="stylesheet" href="livana.css" />
    <style>
        body {
            background: #ECE8E1;
            display: flex;
            justify-content: center;
            padding: 24px;
        }

        .spinner {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2.5px solid var(--primary-container);
            border-top-color: transparent;
            animation: spin .8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .spinner {
                animation: none !important;
            }
        }
    </style>
</head>

<body>
    <div class="screen">
        <!-- dimmed underlying content -->
        <div class="statusbar">
            <span>9:41</span>
            <span class="statusbar__icons">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M2 17h3v3H2zM7 13h3v7H7zM12 9h3v11h-3zM17 5h3v15h-3z" />
                </svg>
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 19l9-13a14 14 0 0 0-18 0z" />
                </svg>
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <rect x="2" y="8" width="18" height="8" rx="2" fill="none" stroke="currentColor" stroke-width="2" />
                    <rect x="4" y="10" width="11" height="4" rx="1" />
                    <rect x="21" y="10" width="2" height="4" rx="1" />
                </svg>
            </span>
        </div>
        <div class="appbar">
            <span class="appbar__title">Create a cause</span>
        </div>
        <div class="screen__scroll">
            <div class="screen__pad" style="opacity:.45;">
                <div class="card card--flat" style="height:150px;margin-top:6px;background:var(--surface-alt);"></div>
                <div class="field" style="margin-top:22px;"></div>
                <div class="field" style="margin-top:16px;height:96px;"></div>
            </div>
        </div>

        <!-- dim backdrop -->
        <div style="position:absolute;inset:0;background:rgba(8,28,24,0.45);z-index:5;"></div>

        <!-- bottom sheet -->
        <div
            style="position:absolute;left:0;right:0;bottom:0;background:var(--surface);border-radius:28px 28px 0 0;padding:20px;z-index:6;box-shadow:0 -16px 40px rgba(20,32,27,0.22);">
            <div style="width:40px;height:4px;border-radius:999px;background:var(--border);margin:0 auto 18px;"></div>
            <h2 style="font-weight:700;font-size:19px;margin:0 0 20px;letter-spacing:-0.01em;">Publishing your cause
            </h2>

            <!-- stepper -->
            <div style="position:relative;">
                <!-- connecting line -->
                <div
                    style="position:absolute;left:17px;top:18px;bottom:54px;width:2px;background:var(--hairline);z-index:0;">
                </div>

                <!-- step 1 complete -->
                <div
                    style="display:flex;gap:14px;align-items:flex-start;position:relative;z-index:1;padding-bottom:22px;">
                    <span class="icochip icochip--jade" style="width:36px;height:36px;border-radius:50%;"><svg
                            class="ico ico--sm" style="stroke-width:2.6;" viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M5 12l4 4L19 6" />
                        </svg></span>
                    <div style="padding-top:7px;">
                        <div style="font-weight:700;">Upload cover image</div>
                    </div>
                </div>

                <!-- step 2 complete -->
                <div
                    style="display:flex;gap:14px;align-items:flex-start;position:relative;z-index:1;padding-bottom:22px;">
                    <span class="icochip icochip--jade" style="width:36px;height:36px;border-radius:50%;"><svg
                            class="ico ico--sm" style="stroke-width:2.6;" viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M5 12l4 4L19 6" />
                        </svg></span>
                    <div style="padding-top:7px;">
                        <div style="font-weight:700;">Prepare metadata (IPFS)</div>
                    </div>
                </div>

                <!-- step 3 active -->
                <div style="display:flex;gap:14px;align-items:flex-start;position:relative;z-index:1;">
                    <span
                        style="width:36px;height:36px;border-radius:50%;background:var(--primary-container);display:flex;align-items:center;justify-content:center;flex:none;">
                        <span class="spinner"></span>
                    </span>
                    <div style="flex:1;">
                        <div style="font-weight:700;">Deploy on-chain</div>
                        <div class="tiny muted" style="margin-top:3px;">Waiting for signature in your wallet…</div>
                        <!-- tx hash row -->
                        <button
                            style="all:unset;cursor:pointer;display:flex;align-items:center;gap:8px;margin-top:10px;background:var(--surface-alt);border-radius:var(--r-input);padding:9px 12px;width:100%;box-sizing:border-box;">
                            <span class="addr" style="flex:1;">0x7a3f…c9b2</span>
                            <svg class="ico ico--sm muted" viewBox="0 0 24 24" aria-hidden="true">
                                <rect x="9" y="9" width="11" height="11" rx="2" />
                                <path d="M5 15V5a2 2 0 0 1 2-2h10" />
                            </svg>
                        </button>
                    </div>
                </div>
            </div>

            <div
                style="display:flex;gap:8px;align-items:center;justify-content:center;margin-top:22px;color:var(--text-secondary);">
                <svg class="ico ico--sm" viewBox="0 0 24 24" aria-hidden="true">
                    <circle cx="12" cy="12" r="9" />
                    <path d="M12 7v5l3 3" />
                </svg>
                <span class="tiny">Keep this screen open while we finish.</span>
            </div>
        </div>
    </div>
</body>

</html>
