<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Livana · Loading skeletons</title>
    <link rel="stylesheet" href="livana.css" />
    <style>
        body {
            background: #ECE8E1;
            display: flex;
            justify-content: center;
            padding: 24px;
        }

        .sk {
            background: linear-gradient(90deg, var(--surface-alt) 25%, #ECE7DE 37%, var(--surface-alt) 63%);
            background-size: 400% 100%;
            animation: shimmer 1.4s ease infinite;
            border-radius: 10px;
        }

        @keyframes shimmer {
            0% {
                background-position: 100% 0
            }

            100% {
                background-position: -100% 0
            }
        }
    </style>
</head>

<body>
    <div class="screen">
        <div class="statusbar">
            <span>9:41</span>
            <span class="statusbar__icons">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M2 17h3v3H2zM7 13h3v7H7zM12 9h3v11h-3zM17 5h3v15h-3z" />
                </svg>
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 19l9-13a14 14 0 0 0-18 0z" />
                </svg>
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <rect x="2" y="8" width="18" height="8" rx="2" fill="none" stroke="currentColor" stroke-width="2" />
                    <rect x="4" y="10" width="11" height="4" rx="1" />
                    <rect x="21" y="10" width="2" height="4" rx="1" />
                </svg>
            </span>
        </div>
        <div class="appbar"><span class="appbar__title">Loading skeletons</span></div>
        <div class="screen__scroll">
            <div class="screen__pad" style="padding-bottom:24px;">
                <!-- stat hero skeleton -->
                <div class="card" style="margin-top:4px;">
                    <div class="sk" style="width:46%;height:13px;"></div>
                    <div class="sk" style="width:62%;height:34px;margin-top:14px;"></div>
                    <div class="sk" style="width:54%;height:13px;margin-top:14px;"></div>
                </div>
                <!-- pool card skeletons -->
                <div style="display:flex;flex-direction:column;gap:16px;margin-top:18px;">
                    <div class="card card--media">
                        <div class="sk" style="height:150px;border-radius:0;"></div>
                        <div style="padding:16px;">
                            <div class="sk" style="width:64%;height:16px;"></div>
                            <div class="sk" style="width:90%;height:12px;margin-top:10px;"></div>
                            <div class="sk" style="width:100%;height:9px;border-radius:999px;margin-top:16px;"></div>
                            <div class="sk" style="width:44%;height:12px;margin-top:10px;"></div>
                        </div>
                    </div>
                    <div class="card card--media">
                        <div class="sk" style="height:150px;border-radius:0;"></div>
                        <div style="padding:16px;">
                            <div class="sk" style="width:54%;height:16px;"></div>
                            <div class="sk" style="width:84%;height:12px;margin-top:10px;"></div>
                            <div class="sk" style="width:100%;height:9px;border-radius:999px;margin-top:16px;"></div>
                            <div class="sk" style="width:40%;height:12px;margin-top:10px;"></div>
                        </div>
                    </div>
                </div>
                <!-- list row skeletons -->
                <div class="card" style="padding:6px 16px;margin-top:18px;">
                    <div style="display:flex;align-items:center;gap:13px;padding:13px 0;">
                        <div class="sk" style="width:38px;height:38px;border-radius:50%;flex:none;"></div>
                        <div style="flex:1;">
                            <div class="sk" style="width:50%;height:13px;"></div>
                            <div class="sk" style="width:30%;height:11px;margin-top:8px;"></div>
                        </div>
                    </div>
                    <hr class="divider" />
                    <div style="display:flex;align-items:center;gap:13px;padding:13px 0;">
                        <div class="sk" style="width:38px;height:38px;border-radius:50%;flex:none;"></div>
                        <div style="flex:1;">
                            <div class="sk" style="width:58%;height:13px;"></div>
                            <div class="sk" style="width:34%;height:11px;margin-top:8px;"></div>
                        </div>
                    </div>
                    <hr class="divider" />
                    <div style="display:flex;align-items:center;gap:13px;padding:13px 0;">
                        <div class="sk" style="width:38px;height:38px;border-radius:50%;flex:none;"></div>
                        <div style="flex:1;">
                            <div class="sk" style="width:44%;height:13px;"></div>
                            <div class="sk" style="width:26%;height:11px;margin-top:8px;"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
