<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Livana · Filter &amp; sort</title>
    <link rel="stylesheet" href="livana.css" />
    <style>
        body {
            background: #ECE8E1;
            display: flex;
            justify-content: center;
            padding: 24px;
        }
    </style>
</head>

<body>
    <div class="screen">
        <!-- dimmed list peeking behind -->
        <div class="statusbar statusbar--light" style="position:relative;z-index:1;">
            <span>9:41</span>
            <span class="statusbar__icons">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M2 17h3v3H2zM7 13h3v7H7zM12 9h3v11h-3zM17 5h3v15h-3z" />
                </svg>
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 19l9-13a14 14 0 0 0-18 0z" />
                </svg>
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <rect x="2" y="8" width="18" height="8" rx="2" fill="none" stroke="currentColor" stroke-width="2" />
                    <rect x="4" y="10" width="11" height="4" rx="1" />
                    <rect x="21" y="10" width="2" height="4" rx="1" />
                </svg>
            </span>
        </div>
        <!-- backdrop scrim covering whole screen -->
        <div style="position:absolute;inset:0;background:rgba(8,28,24,0.45);z-index:5;"></div>
        <!-- bottom sheet -->
        <div
            style="position:absolute;left:0;right:0;bottom:0;z-index:6;background:var(--surface);border-radius:28px 28px 0 0;padding:20px;box-shadow:var(--shadow-lg);">
            <div style="width:40px;height:4px;border-radius:999px;background:var(--border);margin:0 auto 16px;"></div>
            <h2 class="sec-title" style="margin:0 0 18px;"><span class="accent-rule"></span>Filter &amp; sort</h2>

            <div class="tiny" style="font-weight:700;color:var(--text);margin-bottom:10px;">Region</div>
            <div style="display:flex;flex-wrap:wrap;gap:8px;">
                <button class="chip">Global</button>
                <button class="chip">Sub-Saharan Africa</button>
                <button class="chip">North Africa</button>
                <button class="chip">Middle East</button>
                <button class="chip chip--on">South Asia</button>
                <button class="chip">Southeast Asia</button>
                <button class="chip">East Asia</button>
                <button class="chip">Central Asia</button>
                <button class="chip">Europe</button>
                <button class="chip">North America</button>
                <button class="chip">Latin America &amp; Caribbean</button>
                <button class="chip">Oceania</button>
            </div>

            <div class="tiny" style="font-weight:700;color:var(--text);margin:22px 0 6px;">Sort by</div>
            <div style="display:flex;flex-direction:column;">
                <button style="all:unset;cursor:pointer;display:flex;align-items:center;gap:12px;padding:13px 2px;">
                    <span
                        style="width:22px;height:22px;border-radius:50%;border:2px solid var(--primary);display:flex;align-items:center;justify-content:center;flex:none;">
                        <span style="width:11px;height:11px;border-radius:50%;background:var(--primary);"></span>
                    </span>
                    <span style="font-weight:600;">Newest</span>
                </button>
                <hr class="divider" />
                <button style="all:unset;cursor:pointer;display:flex;align-items:center;gap:12px;padding:13px 2px;">
                    <span
                        style="width:22px;height:22px;border-radius:50%;border:2px solid var(--border);flex:none;"></span>
                    <span style="font-weight:600;color:var(--text-secondary);">Most raised</span>
                </button>
                <hr class="divider" />
                <button style="all:unset;cursor:pointer;display:flex;align-items:center;gap:12px;padding:13px 2px;">
                    <span
                        style="width:22px;height:22px;border-radius:50%;border:2px solid var(--border);flex:none;"></span>
                    <span style="font-weight:600;color:var(--text-secondary);">Closest to goal</span>
                </button>
            </div>

            <div style="display:flex;align-items:center;gap:14px;margin-top:22px;">
                <button class="btn btn--ghost" style="font-weight:700;">Reset</button>
                <button class="btn btn--primary" style="flex:1;">Apply</button>
            </div>
        </div>
    </div>
</body>

</html>
