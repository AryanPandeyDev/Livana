<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Livana · Connect wallet</title>
    <link rel="stylesheet" href="livana.css" />
    <style>
        body {
            background: #ECE8E1;
            display: flex;
            justify-content: center;
            padding: 24px;
        }
    </style>
</head>

<body>
    <div class="screen">
        <!-- dim backdrop -->
        <div style="position:absolute;inset:0;background:rgba(8,28,24,0.45);z-index:1;"></div>
        <!-- bottom sheet -->
        <div
            style="position:absolute;left:0;right:0;bottom:0;z-index:2;background:var(--surface);border-radius:28px 28px 0 0;padding:20px;box-shadow:var(--shadow-lg);">
            <!-- grabber -->
            <div style="width:40px;height:4px;border-radius:999px;background:var(--border);margin:0 auto 18px;"></div>

            <h2 style="font-weight:800;font-size:21px;letter-spacing:-0.01em;margin:0;text-align:center;">Connect your
                wallet</h2>
            <p class="muted" style="margin:8px 0 0;text-align:center;font-size:14px;line-height:1.5;">Livana never holds
                your keys or funds — you approve everything in your own wallet.</p>

            <!-- QR placeholder -->
            <div
                style="width:160px;height:160px;border:1px solid var(--border);border-radius:var(--r-img);margin:22px auto 0;display:flex;align-items:center;justify-content:center;background:var(--surface-2);">
                <svg width="120" height="120" viewBox="0 0 24 24" aria-hidden="true"
                    style="color:var(--text);fill:currentColor;">
                    <!-- finder squares -->
                    <path fill="none" stroke="currentColor" stroke-width="1.6"
                        d="M3 3h6v6H3zM15 3h6v6h-6zM3 15h6v6H3z" />
                    <rect x="5" y="5" width="2" height="2" />
                    <rect x="17" y="5" width="2" height="2" />
                    <rect x="5" y="17" width="2" height="2" />
                    <!-- data modules -->
                    <rect x="12" y="3" width="1.6" height="1.6" />
                    <rect x="12" y="6" width="1.6" height="1.6" />
                    <rect x="12" y="12" width="1.6" height="1.6" />
                    <rect x="15" y="12" width="1.6" height="1.6" />
                    <rect x="19" y="12" width="1.6" height="1.6" />
                    <rect x="12" y="15" width="1.6" height="1.6" />
                    <rect x="15" y="15" width="1.6" height="1.6" />
                    <rect x="18" y="15" width="1.6" height="1.6" />
                    <rect x="12" y="18" width="1.6" height="1.6" />
                    <rect x="15" y="18.5" width="1.6" height="1.6" />
                    <rect x="19" y="18" width="1.6" height="1.6" />
                    <rect x="16.5" y="19.5" width="1.6" height="1.6" />
                </svg>
            </div>

            <!-- primary action -->
            <button class="btn btn--primary" style="margin-top:22px;">
                <svg class="ico ico--sm" viewBox="0 0 24 24" aria-hidden="true">
                    <rect x="3" y="6" width="18" height="13" rx="3" />
                    <path d="M16 12h2" />
                    <path d="M3 10h13a2 2 0 0 1 2 2" />
                </svg>Open wallet app
            </button>

            <!-- wallet options -->
            <div style="display:flex;flex-direction:column;gap:10px;margin-top:16px;">
                <button class="card card--flat"
                    style="all:unset;cursor:pointer;display:flex;align-items:center;gap:13px;padding:13px 14px;border-radius:var(--r-input);box-shadow:var(--shadow-sm);background:var(--surface);">
                    <span
                        style="width:40px;height:40px;border-radius:12px;flex:none;background:var(--secondary-container);color:var(--secondary-ink);display:flex;align-items:center;justify-content:center;">
                        <svg class="ico ico--sm" viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M4 7l8-4 8 4-8 4z" />
                            <path d="M4 7v10l8 4 8-4V7" />
                        </svg>
                    </span>
                    <span style="flex:1;font-weight:700;">MetaMask</span>
                    <svg class="ico ico--sm muted" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M9 6l6 6-6 6" />
                    </svg>
                </button>
                <button class="card card--flat"
                    style="all:unset;cursor:pointer;display:flex;align-items:center;gap:13px;padding:13px 14px;border-radius:var(--r-input);box-shadow:var(--shadow-sm);background:var(--surface);">
                    <span
                        style="width:40px;height:40px;border-radius:12px;flex:none;background:var(--primary-container);color:var(--primary);display:flex;align-items:center;justify-content:center;">
                        <svg class="ico ico--sm" viewBox="0 0 24 24" aria-hidden="true">
                            <circle cx="12" cy="12" r="8" />
                            <path d="M9.5 9.5h5v5h-5z" />
                        </svg>
                    </span>
                    <span style="flex:1;font-weight:700;">Core</span>
                    <svg class="ico ico--sm muted" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M9 6l6 6-6 6" />
                    </svg>
                </button>
            </div>

            <!-- info link -->
            <div style="display:flex;justify-content:center;margin-top:14px;">
                <button class="btn btn--ghost" style="display:inline-flex;align-items:center;gap:7px;">
                    <svg class="ico ico--sm" viewBox="0 0 24 24" aria-hidden="true">
                        <circle cx="12" cy="12" r="9" />
                        <path d="M12 11v5M12 8h.01" />
                    </svg>What is a wallet?
                </button>
            </div>
        </div>
    </div>
</body>

</html>
