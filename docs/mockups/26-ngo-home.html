<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Livana · Your NGO</title>
    <link rel="stylesheet" href="livana.css" />
    <style>
        body {
            background: #ECE8E1;
            display: flex;
            justify-content: center;
            padding: 24px;
        }
    </style>
</head>

<body>
    <div class="screen">
        <div class="statusbar">
            <span>9:41</span>
            <span class="statusbar__icons">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M2 17h3v3H2zM7 13h3v7H7zM12 9h3v11h-3zM17 5h3v15h-3z" />
                </svg>
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 19l9-13a14 14 0 0 0-18 0z" />
                </svg>
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <rect x="2" y="8" width="18" height="8" rx="2" fill="none" stroke="currentColor" stroke-width="2" />
                    <rect x="4" y="10" width="11" height="4" rx="1" />
                    <rect x="21" y="10" width="2" height="4" rx="1" />
                </svg>
            </span>
        </div>
        <div class="appbar">
            <button class="chip iconbtn" aria-label="Back"><svg class="ico ico--sm" viewBox="0 0 24 24"
                    aria-hidden="true">
                    <path d="M15 6l-6 6 6 6" />
                </svg></button>
            <span class="appbar__title">Your NGO</span>
            <span style="width:42px;"></span>
        </div>
        <div class="screen__scroll">
            <div class="screen__pad" style="padding-bottom:28px;">
                <!-- reputation snapshot -->
                <button style="all:unset;cursor:pointer;display:block;width:100%;margin-top:4px;">
                    <div class="card"
                        style="background:var(--grad-hero);box-shadow:var(--shadow-jade);overflow:hidden;">
                        <svg class="blossom-wm" viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M12 2c2.5 3 6 4.2 6 8a6 6 0 0 1-12 0c0-3.8 3.5-5 6-8z" fill="#fff" />
                        </svg>
                        <div style="position:relative;color:#fff;display:flex;align-items:center;gap:14px;">
                            <div style="flex:1;">
                                <div class="tiny" style="font-weight:600;color:rgba(255,255,255,0.82);">Your reputation
                                </div>
                                <div class="metric" style="font-size:38px;margin-top:6px;">5 SBTs</div>
                                <div style="font-weight:600;color:rgba(255,255,255,0.9);margin-top:8px;font-size:14px;">
                                    $15,000 released · 3 pools</div>
                            </div>
                            <svg class="ico" style="color:rgba(255,255,255,0.85);" viewBox="0 0 24 24"
                                aria-hidden="true">
                                <path d="M9 6l6 6-6 6" />
                            </svg>
                        </div>
                    </div>
                </button>
                <!-- create pool CTA -->
                <button class="btn btn--primary" style="margin-top:16px;">
                    <svg class="ico ico--sm" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M12 5v14M5 12h14" />
                    </svg>Create pool
                </button>
                <!-- your pools -->
                <h2 class="sec-title" style="margin:26px 0 14px;"><span class="accent-rule"></span>Your pools</h2>
                <div style="display:flex;flex-direction:column;gap:16px;">
                    <!-- pool card 1 -->
                    <div class="card card--media">
                        <div class="cover" style="height:140px;"><img
                                src="https://picsum.photos/seed/livana-flood/600/360" alt="" onerror="this.remove()" />
                            <span style="position:absolute;left:12px;top:12px;"><span class="pill pill--region">South
                                    Asia</span></span>
                            <span style="position:absolute;right:12px;top:12px;"><span
                                    class="pill pill--verify">Active</span></span>
                        </div>
                        <div style="padding:16px;">
                            <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;">
                                <div style="font-weight:700;line-height:1.25;">Flood Relief Fund</div>
                                <span class="chip" style="height:26px;padding:0 10px;font-size:11.5px;">
                                    <svg class="ico" style="width:13px;height:13px;" viewBox="0 0 24 24"
                                        aria-hidden="true">
                                        <path d="M7 3h7l4 4v14H7z" />
                                        <path d="M14 3v4h4" />
                                    </svg>3 proofs</span>
                            </div>
                            <div class="progress" style="margin:13px 0 9px;">
                                <div class="progress__fill" style="width:50%;"></div>
                            </div>
                            <div class="tiny"><strong>$5,000</strong> <span class="muted">of $10,000</span></div>
                        </div>
                    </div>
                    <!-- pool card 2 -->
                    <div class="card card--media">
                        <div class="cover cover--edu" style="height:140px;"><img
                                src="https://picsum.photos/seed/livana-school/600/360" alt="" onerror="this.remove()" />
                            <span style="position:absolute;left:12px;top:12px;"><span
                                    class="pill pill--region">Sub-Saharan Africa</span></span>
                            <span style="position:absolute;right:12px;top:12px;"><span
                                    class="pill pill--paused">Paused</span></span>
                        </div>
                        <div style="padding:16px;">
                            <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;">
                                <div style="font-weight:700;line-height:1.25;">Classrooms for Kids</div>
                                <span class="chip" style="height:26px;padding:0 10px;font-size:11.5px;">
                                    <svg class="ico" style="width:13px;height:13px;" viewBox="0 0 24 24"
                                        aria-hidden="true">
                                        <path d="M7 3h7l4 4v14H7z" />
                                        <path d="M14 3v4h4" />
                                    </svg>2 proofs</span>
                            </div>
                            <div class="progress" style="margin:13px 0 9px;">
                                <div class="progress__fill" style="width:72%;"></div>
                            </div>
                            <div class="tiny"><strong>$7,200</strong> <span class="muted">of $10,000</span></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
