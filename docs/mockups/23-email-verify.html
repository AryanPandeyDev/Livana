<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Livana · Verify email</title>
    <link rel="stylesheet" href="livana.css" />
    <style>
        body {
            background: #ECE8E1;
            display: flex;
            justify-content: center;
            padding: 24px;
        }
    </style>
</head>

<body>
    <div class="screen">
        <div class="statusbar">
            <span>9:41</span>
            <span class="statusbar__icons">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M2 17h3v3H2zM7 13h3v7H7zM12 9h3v11h-3zM17 5h3v15h-3z" />
                </svg>
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 19l9-13a14 14 0 0 0-18 0z" />
                </svg>
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <rect x="2" y="8" width="18" height="8" rx="2" fill="none" stroke="currentColor" stroke-width="2" />
                    <rect x="4" y="10" width="11" height="4" rx="1" />
                    <rect x="21" y="10" width="2" height="4" rx="1" />
                </svg>
            </span>
        </div>
        <div class="appbar">
            <button class="chip iconbtn" aria-label="Back"><svg class="ico ico--sm" viewBox="0 0 24 24"
                    aria-hidden="true">
                    <path d="M15 6l-6 6 6 6" />
                </svg></button>
            <span class="appbar__title">Verify your official email</span>
            <span style="width:42px;"></span>
        </div>
        <div class="screen__scroll">
            <div class="screen__pad" style="padding-bottom:32px;">
                <div class="card" style="margin-top:8px;">
                    <div style="display:flex;align-items:center;gap:12px;">
                        <span class="icochip icochip--jade"><svg class="ico ico--sm" viewBox="0 0 24 24"
                                aria-hidden="true">
                                <rect x="3" y="5" width="18" height="14" rx="3" />
                                <path d="M4 7l8 6 8-6" />
                            </svg></span>
                        <div style="flex:1;min-width:0;">
                            <div style="font-weight:700;overflow-wrap:anywhere;">contact@cleanwater.org</div>
                        </div>
                        <span class="pill pill--paused">Not verified</span>
                    </div>
                    <hr class="divider" style="margin:18px 0;" />
                    <p class="muted" style="margin:0;line-height:1.55;">Verifying this email confirms you control your
                        organization's inbox. We'll send a secure link to complete the check.</p>
                    <button class="btn btn--primary" style="margin-top:18px;">Verify email</button>
                </div>
            </div>
        </div>
        <div class="dock">
            <p class="tiny muted" style="text-align:center;margin:0 0 10px;">Verify your email to continue.</p>
            <button class="btn btn--primary" disabled>Submit application</button>
        </div>
    </div>
</body>

</html>
