<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Livana · Profile</title>
    <link rel="stylesheet" href="livana.css" />
    <style>
        body {
            background: #ECE8E1;
            display: flex;
            justify-content: center;
            padding: 24px;
        }
    </style>
</head>

<body>
    <div class="screen">
        <div class="statusbar">
            <span>9:41</span>
            <span class="statusbar__icons">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M2 17h3v3H2zM7 13h3v7H7zM12 9h3v11h-3zM17 5h3v15h-3z" />
                </svg>
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 19l9-13a14 14 0 0 0-18 0z" />
                </svg>
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <rect x="2" y="8" width="18" height="8" rx="2" fill="none" stroke="currentColor" stroke-width="2" />
                    <rect x="4" y="10" width="11" height="4" rx="1" />
                    <rect x="21" y="10" width="2" height="4" rx="1" />
                </svg>
            </span>
        </div>
        <div class="appbar">
            <h2 class="sec-title"><span class="accent-rule"></span>Profile</h2>
            <button class="chip iconbtn" aria-label="Settings"><svg class="ico ico--sm" viewBox="0 0 24 24"
                    aria-hidden="true">
                    <circle cx="12" cy="12" r="3.2" />
                    <path
                        d="M19 12a7 7 0 0 0-.1-1.3l1.7-1.3-1.7-3-2 .8a7 7 0 0 0-2.2-1.3L14 3h-4l-.4 2.6a7 7 0 0 0-2.2 1.3l-2-.8-1.7 3L5.1 10.7A7 7 0 0 0 5 12a7 7 0 0 0 .1 1.3l-1.7 1.3 1.7 3 2-.8a7 7 0 0 0 2.2 1.3L10 21h4l.4-2.6a7 7 0 0 0 2.2-1.3l2 .8 1.7-3-1.7-1.3A7 7 0 0 0 19 12z" />
                </svg></button>
        </div>
        <div class="screen__scroll">
            <div class="screen__pad" style="padding-bottom:96px;">
                <!-- header -->
                <div
                    style="display:flex;flex-direction:column;align-items:center;text-align:center;padding:14px 0 6px;">
                    <img class="avatar" style="width:66px;height:66px;"
                        src="https://picsum.photos/seed/livana-alice/160/160" alt="" onerror="this.remove()" />
                    <h2 style="font-size:20px;font-weight:700;margin:12px 0 0;">Alice</h2>
                    <div class="muted" style="margin-top:2px;">alice@example.com</div>
                    <span class="pill"
                        style="margin-top:10px;background:var(--surface-alt);color:var(--text-secondary);">Donor</span>
                </div>
                <!-- wallet -->
                <h2 class="sec-title" style="font-size:14px;margin:18px 0 10px;color:var(--text-secondary);">Wallet</h2>
                <div class="card">
                    <div style="display:flex;align-items:center;gap:10px;">
                        <span class="icochip icochip--jade" style="width:38px;height:38px;border-radius:12px;"><svg
                                class="ico ico--sm" viewBox="0 0 24 24" aria-hidden="true">
                                <rect x="3" y="6" width="18" height="13" rx="3" />
                                <path d="M16 12h2" />
                            </svg></span>
                        <div style="flex:1;min-width:0;">
                            <div class="addr">0x3c44…93bc</div>
                            <span class="chip" style="height:24px;padding:0 10px;margin-top:6px;font-size:11.5px;">Local
                                · Anvil</span>
                        </div>
                        <button class="chip iconbtn" aria-label="Copy address"><svg class="ico ico--sm"
                                viewBox="0 0 24 24" aria-hidden="true">
                                <rect x="9" y="9" width="11" height="11" rx="2.5" />
                                <path d="M5 15V5.5A1.5 1.5 0 0 1 6.5 4H15" />
                            </svg></button>
                    </div>
                    <hr class="divider" style="margin:16px 0;" />
                    <div style="display:flex;gap:10px;">
                        <button class="btn btn--tonal" style="height:46px;font-size:14px;">Re-link wallet</button>
                        <button class="btn btn--ghost" style="width:auto;flex:none;padding:0 14px;">Disconnect</button>
                    </div>
                </div>
                <!-- nav rows -->
                <h2 class="sec-title" style="font-size:14px;margin:22px 0 10px;color:var(--text-secondary);">Account
                </h2>
                <div class="card" style="padding:4px 16px;">
                    <button class="navrow"
                        style="display:flex;align-items:center;gap:13px;width:100%;background:none;border:none;cursor:pointer;padding:15px 0;text-align:left;color:var(--text);font:inherit;">
                        <span class="icochip icochip--jade" style="width:38px;height:38px;border-radius:12px;"><svg
                                class="ico ico--sm" viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M12 21s-7-4.5-7-10a4 4 0 0 1 7-2 4 4 0 0 1 7 2c0 5.5-7 10-7 10z" />
                            </svg></span>
                        <span style="flex:1;font-weight:600;">Your giving</span>
                        <svg class="ico ico--sm" style="color:var(--text-muted);" viewBox="0 0 24 24"
                            aria-hidden="true">
                            <path d="M9 6l6 6-6 6" />
                        </svg>
                    </button>
                    <hr class="divider" />
                    <button class="navrow"
                        style="display:flex;align-items:center;gap:13px;width:100%;background:none;border:none;cursor:pointer;padding:15px 0;text-align:left;color:var(--text);font:inherit;">
                        <span class="icochip icochip--coral" style="width:38px;height:38px;border-radius:12px;"><svg
                                class="ico ico--sm" viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M12 3l7 3v5c0 4.4-3 7.6-7 9-4-1.4-7-4.6-7-9V6z" />
                                <path d="M9 12l2 2 4-4" />
                            </svg></span>
                        <span style="flex:1;font-weight:600;">Become an NGO</span>
                        <svg class="ico ico--sm" style="color:var(--text-muted);" viewBox="0 0 24 24"
                            aria-hidden="true">
                            <path d="M9 6l6 6-6 6" />
                        </svg>
                    </button>
                    <hr class="divider" />
                    <button class="navrow"
                        style="display:flex;align-items:center;gap:13px;width:100%;background:none;border:none;cursor:pointer;padding:15px 0;text-align:left;color:var(--text);font:inherit;">
                        <span class="icochip icochip--info" style="width:38px;height:38px;border-radius:12px;"><svg
                                class="ico ico--sm" viewBox="0 0 24 24" aria-hidden="true">
                                <circle cx="12" cy="12" r="3.2" />
                                <path
                                    d="M19 12a7 7 0 0 0-.1-1.3l1.7-1.3-1.7-3-2 .8a7 7 0 0 0-2.2-1.3L14 3h-4l-.4 2.6a7 7 0 0 0-2.2 1.3l-2-.8-1.7 3L5.1 10.7A7 7 0 0 0 5 12a7 7 0 0 0 .1 1.3l-1.7 1.3 1.7 3 2-.8a7 7 0 0 0 2.2 1.3L10 21h4l.4-2.6a7 7 0 0 0 2.2-1.3l2 .8 1.7-3-1.7-1.3A7 7 0 0 0 19 12z" />
                            </svg></span>
                        <span style="flex:1;font-weight:600;">Settings</span>
                        <svg class="ico ico--sm" style="color:var(--text-muted);" viewBox="0 0 24 24"
                            aria-hidden="true">
                            <path d="M9 6l6 6-6 6" />
                        </svg>
                    </button>
                </div>
                <!-- sign out -->
                <div class="card" style="padding:4px 16px;margin-top:14px;">
                    <button class="navrow"
                        style="display:flex;align-items:center;gap:13px;width:100%;background:none;border:none;cursor:pointer;padding:15px 0;text-align:left;color:var(--error);font:inherit;font-weight:700;">
                        <span class="icochip"
                            style="width:38px;height:38px;border-radius:12px;background:var(--secondary-container);color:var(--error);"><svg
                                class="ico ico--sm" viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M15 12H4" />
                                <path d="M8 8l-4 4 4 4" />
                                <path d="M14 4h4a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2h-4" />
                            </svg></span>
                        <span style="flex:1;">Sign out</span>
                    </button>
                </div>
            </div>
        </div>
        <!-- bottom nav -->
        <nav class="bottomnav">
            <button class="navitem"><svg class="ico" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M4 11l8-7 8 7" />
                    <path d="M6 10v9h12v-9" />
                </svg>Home</button>
            <button class="navitem"><svg class="ico" viewBox="0 0 24 24" aria-hidden="true">
                    <circle cx="11" cy="11" r="7" />
                    <path d="M20 20l-3.5-3.5" />
                </svg>Explore</button>
            <button class="navitem"><svg class="ico" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M5 20V9M12 20V4M19 20v-7" />
                </svg>Boards</button>
            <button class="navitem"><svg class="ico" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 21s-7-4.5-7-10a4 4 0 0 1 7-2 4 4 0 0 1 7 2c0 5.5-7 10-7 10z" />
                </svg>Activity</button>
            <button class="navitem navitem--on"><svg class="ico" viewBox="0 0 24 24" aria-hidden="true">
                    <circle cx="12" cy="8" r="4" />
                    <path d="M4 21c0-4 3.5-6 8-6s8 2 8 6" />
                </svg>Profile</button>
        </nav>
    </div>
</body>

</html>
