<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Livana · Your proofs</title>
    <link rel="stylesheet" href="livana.css" />
    <style>
        body {
            background: #ECE8E1;
            display: flex;
            justify-content: center;
            padding: 24px;
        }
    </style>
</head>

<body>
    <div class="screen">
        <div class="statusbar">
            <span>9:41</span>
            <span class="statusbar__icons">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M2 17h3v3H2zM7 13h3v7H7zM12 9h3v11h-3zM17 5h3v15h-3z" />
                </svg>
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 19l9-13a14 14 0 0 0-18 0z" />
                </svg>
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <rect x="2" y="8" width="18" height="8" rx="2" fill="none" stroke="currentColor" stroke-width="2" />
                    <rect x="4" y="10" width="11" height="4" rx="1" />
                    <rect x="21" y="10" width="2" height="4" rx="1" />
                </svg>
            </span>
        </div>
        <div class="appbar">
            <button class="chip iconbtn" aria-label="Back"><svg class="ico ico--sm" viewBox="0 0 24 24"
                    aria-hidden="true">
                    <path d="M15 6l-6 6 6 6" />
                </svg></button>
            <span class="appbar__title">Your proofs</span>
            <span style="width:42px;"></span>
        </div>
        <div class="screen__scroll">
            <div class="screen__pad" style="padding-bottom:28px;">
                <!-- filter row -->
                <div style="display:flex;gap:10px;margin-top:6px;">
                    <button class="chip chip--on">All</button>
                    <button class="chip">Pending</button>
                    <button class="chip">Released</button>
                </div>
                <!-- list -->
                <div class="card" style="padding:4px 16px;margin-top:18px;">
                    <!-- row 1 -->
                    <div style="display:flex;align-items:center;gap:12px;padding:14px 0;">
                        <span class="icochip icochip--jade" style="width:42px;height:42px;border-radius:12px;"><svg
                                class="ico ico--sm" viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M7 3h7l4 4v14H7z" />
                                <path d="M14 3v4h4" />
                            </svg></span>
                        <div style="flex:1;">
                            <div style="font-weight:700;">Flood Relief Fund</div>
                            <div class="tiny muted" style="margin-top:2px;"><strong style="color:var(--text);">$500
                                    claimed</strong> · Jun 7</div>
                        </div>
                        <span class="pill pill--released"><svg class="ico"
                                style="width:12px;height:12px;stroke-width:2.8" viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M5 12l4 4L19 6" />
                            </svg>Released</span>
                    </div>
                    <hr class="divider" />
                    <!-- row 2 -->
                    <div style="display:flex;align-items:center;gap:12px;padding:14px 0;">
                        <span class="icochip icochip--jade" style="width:42px;height:42px;border-radius:12px;"><svg
                                class="ico ico--sm" viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M7 3h7l4 4v14H7z" />
                                <path d="M14 3v4h4" />
                            </svg></span>
                        <div style="flex:1;">
                            <div style="font-weight:700;">Flood Relief Fund</div>
                            <div class="tiny muted" style="margin-top:2px;"><strong style="color:var(--text);">$800
                                    claimed</strong> · Jun 9</div>
                        </div>
                        <span class="pill pill--pending"><svg class="ico"
                                style="width:12px;height:12px;stroke-width:2.2" viewBox="0 0 24 24" aria-hidden="true">
                                <circle cx="12" cy="12" r="9" />
                                <path d="M12 8v4l3 2" />
                            </svg>Pending</span>
                    </div>
                    <hr class="divider" />
                    <!-- row 3 -->
                    <div style="display:flex;align-items:center;gap:12px;padding:14px 0;">
                        <span class="icochip icochip--jade" style="width:42px;height:42px;border-radius:12px;"><svg
                                class="ico ico--sm" viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M7 3h7l4 4v14H7z" />
                                <path d="M14 3v4h4" />
                            </svg></span>
                        <div style="flex:1;">
                            <div style="font-weight:700;">Classrooms for Kids</div>
                            <div class="tiny muted" style="margin-top:2px;"><strong style="color:var(--text);">$1,200
                                    claimed</strong> · Jun 2</div>
                        </div>
                        <span class="pill pill--released"><svg class="ico"
                                style="width:12px;height:12px;stroke-width:2.8" viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M5 12l4 4L19 6" />
                            </svg>Released</span>
                    </div>
                    <hr class="divider" />
                    <!-- row 4 -->
                    <div style="display:flex;align-items:center;gap:12px;padding:14px 0;">
                        <span class="icochip icochip--jade" style="width:42px;height:42px;border-radius:12px;"><svg
                                class="ico ico--sm" viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M7 3h7l4 4v14H7z" />
                                <path d="M14 3v4h4" />
                            </svg></span>
                        <div style="flex:1;">
                            <div style="font-weight:700;">Classrooms for Kids</div>
                            <div class="tiny muted" style="margin-top:2px;"><strong style="color:var(--text);">$650
                                    claimed</strong> · May 28</div>
                        </div>
                        <span class="pill pill--pending"><svg class="ico"
                                style="width:12px;height:12px;stroke-width:2.2" viewBox="0 0 24 24" aria-hidden="true">
                                <circle cx="12" cy="12" r="9" />
                                <path d="M12 8v4l3 2" />
                            </svg>Pending</span>
                    </div>
                    <hr class="divider" />
                    <!-- row 5 -->
                    <div style="display:flex;align-items:center;gap:12px;padding:14px 0;">
                        <span class="icochip icochip--jade" style="width:42px;height:42px;border-radius:12px;"><svg
                                class="ico ico--sm" viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M7 3h7l4 4v14H7z" />
                                <path d="M14 3v4h4" />
                            </svg></span>
                        <div style="flex:1;">
                            <div style="font-weight:700;">Clean Water Project</div>
                            <div class="tiny muted" style="margin-top:2px;"><strong style="color:var(--text);">$2,000
                                    claimed</strong> · May 14</div>
                        </div>
                        <span class="pill pill--released"><svg class="ico"
                                style="width:12px;height:12px;stroke-width:2.8" viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M5 12l4 4L19 6" />
                            </svg>Released</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
