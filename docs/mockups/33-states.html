<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Livana · State templates</title>
    <link rel="stylesheet" href="livana.css" />
    <style>
        body {
            background: #ECE8E1;
            display: flex;
            justify-content: center;
            padding: 24px;
        }

        .state {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 30px 0;
        }

        .state__tag {
            font: 700 11px/1 var(--font-sans);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 16px;
        }

        .state__ill {
            width: 84px;
            height: 84px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--primary-container);
            color: var(--primary);
            margin-bottom: 18px;
        }

        .state h3 {
            font-size: 18px;
            font-weight: 700;
            margin: 0;
            letter-spacing: -0.01em;
        }

        .state p {
            margin: 7px 0 16px;
            color: var(--text-secondary);
            font-size: 14px;
            max-width: 30ch;
        }

        .illsvg {
            width: 42px;
            height: 42px;
            fill: none;
            stroke: currentColor;
            stroke-width: 1.7;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
    </style>
</head>

<body>
    <div class="screen">
        <div class="statusbar">
            <span>9:41</span>
            <span class="statusbar__icons">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M2 17h3v3H2zM7 13h3v7H7zM12 9h3v11h-3zM17 5h3v15h-3z" />
                </svg>
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 19l9-13a14 14 0 0 0-18 0z" />
                </svg>
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <rect x="2" y="8" width="18" height="8" rx="2" fill="none" stroke="currentColor" stroke-width="2" />
                    <rect x="4" y="10" width="11" height="4" rx="1" />
                    <rect x="21" y="10" width="2" height="4" rx="1" />
                </svg>
            </span>
        </div>
        <div class="appbar"><span class="appbar__title">State templates</span></div>
        <div class="screen__scroll">
            <div class="screen__pad" style="padding-bottom:24px;">
                <!-- EMPTY -->
                <div class="state">
                    <span class="state__tag">Empty</span>
                    <span class="state__ill"><svg class="illsvg" viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M12 3c2.2 2.6 5.2 3.7 5.2 7a5.2 5.2 0 0 1-10.4 0c0-3.3 3-4.4 5.2-7z" />
                            <path d="M9.5 11c.7 1.4 4.3 1.4 5 0" />
                        </svg></span>
                    <h3>Nothing here yet</h3>
                    <p>When there's activity, it'll show up here.</p>
                    <button class="btn btn--tonal" style="width:auto;padding:0 22px;height:46px;">Explore
                        causes</button>
                </div>
                <hr class="divider" />
                <!-- ERROR -->
                <div class="state">
                    <span class="state__tag">Error</span>
                    <span class="state__ill"
                        style="background:var(--secondary-container);color:var(--secondary-ink);"><svg class="illsvg"
                            viewBox="0 0 24 24" aria-hidden="true">
                            <circle cx="12" cy="12" r="9" />
                            <path d="M12 8v5M12 16h.01" />
                        </svg></span>
                    <h3>Something went wrong</h3>
                    <p>We couldn't load this. Please try again.</p>
                    <button class="btn btn--primary" style="width:auto;padding:0 24px;">Try again</button>
                </div>
                <hr class="divider" />
                <!-- OFFLINE -->
                <div class="state">
                    <span class="state__tag">Offline</span>
                    <span class="state__ill" style="background:var(--surface-alt);color:var(--text-secondary);"><svg
                            class="illsvg" viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M5 18a4 4 0 0 1 1-7.8 6 6 0 0 1 11-1.5" />
                            <path d="M19 13a3.5 3.5 0 0 1 0 5" />
                            <path d="M3 3l18 18" />
                        </svg></span>
                    <h3>You're offline</h3>
                    <p>Check your connection and retry.</p>
                    <button class="btn btn--outline" style="width:auto;padding:0 24px;">Retry</button>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
