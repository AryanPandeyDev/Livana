<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Livana · Thank you</title>
    <link rel="stylesheet" href="livana.css" />
    <style>
        body {
            background: #ECE8E1;
            display: flex;
            justify-content: center;
            padding: 24px;
        }

        .pulse-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #235D86;
            animation: pulse 1.4s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.35;
                transform: scale(0.7);
            }
        }

        @media (prefers-reduced-motion:reduce) {
            .pulse-dot {
                animation: none !important;
            }
        }
    </style>
</head>

<body>
    <div class="screen">
        <div class="statusbar">
            <span>9:41</span>
            <span class="statusbar__icons">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M2 17h3v3H2zM7 13h3v7H7zM12 9h3v11h-3zM17 5h3v15h-3z" />
                </svg>
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 19l9-13a14 14 0 0 0-18 0z" />
                </svg>
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <rect x="2" y="8" width="18" height="8" rx="2" fill="none" stroke="currentColor" stroke-width="2" />
                    <rect x="4" y="10" width="11" height="4" rx="1" />
                    <rect x="21" y="10" width="2" height="4" rx="1" />
                </svg>
            </span>
        </div>
        <div class="screen__scroll">
            <div class="screen__pad"
                style="display:flex;flex-direction:column;align-items:center;text-align:center;padding-top:64px;">
                <!-- blossom badge -->
                <div
                    style="width:110px;height:110px;border-radius:50%;background:var(--primary-container);display:flex;align-items:center;justify-content:center;">
                    <svg width="58" height="58" viewBox="0 0 24 24" aria-hidden="true">
                        <circle cx="12" cy="5.4" r="3.1" fill="var(--primary)" />
                        <circle cx="12" cy="18.6" r="3.1" fill="var(--primary)" />
                        <circle cx="5.4" cy="12" r="3.1" fill="var(--primary)" />
                        <circle cx="18.6" cy="12" r="3.1" fill="var(--primary)" />
                        <circle cx="12" cy="12" r="2.7" fill="var(--secondary)" />
                    </svg>
                </div>

                <h1 style="font-weight:800;font-size:25px;letter-spacing:-0.01em;margin:24px 0 0;">Thank you for your
                    gift</h1>
                <p style="margin:10px 0 0;font-size:15.5px;color:var(--text-secondary);">$50 to <span
                        style="color:var(--primary);font-weight:700;">Flood Relief Fund</span></p>

                <!-- updating pill -->
                <span class="pill pill--pending" style="margin-top:18px;height:28px;padding:0 13px;">
                    <span class="pulse-dot"></span>Updating…
                </span>
                <p class="tiny muted" style="margin:12px 0 0;line-height:1.5;max-width:34ch;">Confirmed on-chain — it'll
                    appear in the cause's activity shortly.</p>

                <!-- tx hash row -->
                <div class="card card--flat"
                    style="display:flex;align-items:center;gap:10px;padding:11px 14px;margin-top:24px;border-radius:var(--r-input);width:100%;">
                    <span class="tiny muted" style="font-weight:600;">Tx</span>
                    <span class="addr" style="flex:1;text-align:left;">0x2bf5…a81b</span>
                    <button style="all:unset;cursor:pointer;color:var(--text-secondary);display:flex;"
                        aria-label="Copy transaction hash">
                        <svg class="ico ico--sm" viewBox="0 0 24 24" aria-hidden="true">
                            <rect x="9" y="9" width="11" height="11" rx="2" />
                            <path d="M5 15V5a2 2 0 0 1 2-2h8" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>
        <div class="dock">
            <button class="btn btn--primary">
                <svg class="ico ico--sm" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M3 12s3.5-7 9-7 9 7 9 7-3.5 7-9 7-9-7-9-7z" />
                    <circle cx="12" cy="12" r="3" />
                </svg>View cause
            </button>
            <button class="btn btn--outline" style="margin-top:8px;">
                <svg class="ico ico--sm" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 16V4M8 8l4-4 4 4" />
                    <path d="M5 14v5h14v-5" />
                </svg>Share
            </button>
        </div>
    </div>
</body>

</html>
