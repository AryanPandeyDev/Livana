<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Livana · Application</title>
    <link rel="stylesheet" href="livana.css" />
    <style>
        body {
            background: #ECE8E1;
            display: flex;
            justify-content: center;
            padding: 24px;
        }

        .stepper {
            display: flex;
            align-items: flex-start;
        }

        .stage {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            flex: none;
            width: 64px;
        }

        .dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid var(--border);
            background: var(--surface);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .dot--done {
            background: var(--primary);
            border-color: var(--primary);
            color: var(--on-primary);
        }

        .dot--active {
            width: 24px;
            height: 24px;
            background: var(--primary);
            border-color: var(--primary);
            box-shadow: 0 0 0 5px var(--primary-container);
        }

        .stage__label {
            font: 600 11px/1.25 var(--font-sans);
            color: var(--text-muted);
            text-align: center;
        }

        .stage__label--on {
            color: var(--primary);
            font-weight: 700;
        }

        .connector {
            flex: 1;
            height: 3px;
            border-radius: 999px;
            background: var(--border);
            margin-top: 11px;
        }

        .connector--fill {
            background: var(--primary);
        }
    </style>
</head>

<body>
    <div class="screen">
        <div class="statusbar">
            <span>9:41</span>
            <span class="statusbar__icons">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M2 17h3v3H2zM7 13h3v7H7zM12 9h3v11h-3zM17 5h3v15h-3z" />
                </svg>
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 19l9-13a14 14 0 0 0-18 0z" />
                </svg>
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <rect x="2" y="8" width="18" height="8" rx="2" fill="none" stroke="currentColor" stroke-width="2" />
                    <rect x="4" y="10" width="11" height="4" rx="1" />
                    <rect x="21" y="10" width="2" height="4" rx="1" />
                </svg>
            </span>
        </div>
        <div class="appbar">
            <button class="chip iconbtn" aria-label="Back"><svg class="ico ico--sm" viewBox="0 0 24 24"
                    aria-hidden="true">
                    <path d="M15 6l-6 6 6 6" />
                </svg></button>
            <span class="appbar__title">Application</span>
            <span style="width:42px;"></span>
        </div>
        <div class="screen__scroll">
            <div class="screen__pad" style="padding-bottom:32px;">
                <!-- stepper -->
                <div class="stepper" style="margin-top:12px;">
                    <div class="stage">
                        <span class="dot dot--done"><svg class="ico" style="width:10px;height:10px;stroke-width:3"
                                viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M5 12l4 4L19 6" />
                            </svg></span>
                        <span class="stage__label">Draft</span>
                    </div>
                    <span class="connector connector--fill"></span>
                    <div class="stage">
                        <span class="dot dot--active"></span>
                        <span class="stage__label stage__label--on">AI screening</span>
                    </div>
                    <span class="connector"></span>
                    <div class="stage">
                        <span class="dot"></span>
                        <span class="stage__label">Pending review</span>
                    </div>
                    <span class="connector"></span>
                    <div class="stage">
                        <span class="dot"></span>
                        <span class="stage__label">Approved</span>
                    </div>
                </div>
                <!-- state card -->
                <div class="card" style="margin-top:28px;text-align:center;padding:32px 24px;">
                    <div
                        style="width:104px;height:104px;border-radius:50%;background:var(--primary-container);display:flex;align-items:center;justify-content:center;margin:0 auto;">
                        <svg viewBox="0 0 24 24" aria-hidden="true"
                            style="width:48px;height:48px;fill:none;stroke:var(--primary);stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;">
                            <path d="M7 3h7l4 4v9a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z" />
                            <path d="M14 3v4h4" />
                            <path d="M8.5 11h4M8.5 8h2" />
                            <circle cx="13" cy="15.5" r="3.2" />
                            <path d="M15.4 17.9L18 20.5" />
                        </svg>
                    </div>
                    <h2 style="font-size:20px;font-weight:700;margin:20px 0 0;letter-spacing:-0.01em;">We're reviewing
                        your organization</h2>
                    <p class="muted" style="margin:10px 0 0;line-height:1.55;">AI screening is underway — this can take
                        a
                        little while. We'll update you here.</p>
                    <hr class="divider" style="margin:20px 0 0;" />
                    <p class="tiny muted" style="margin:16px 0 0;">Submitted Jun 7 · usually within a day.</p>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
