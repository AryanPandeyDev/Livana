<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Livana · Wallet account warning</title>
    <link rel="stylesheet" href="livana.css" />
    <style>
        body {
            background: #ECE8E1;
            display: flex;
            justify-content: center;
            padding: 24px;
        }
    </style>
</head>

<body>
    <div class="screen">
        <!-- dim backdrop -->
        <div style="position:absolute;inset:0;background:rgba(8,28,24,0.45);z-index:1;"></div>
        <!-- bottom sheet -->
        <div
            style="position:absolute;left:0;right:0;bottom:0;z-index:2;background:var(--surface);border-radius:28px 28px 0 0;padding:20px;box-shadow:var(--shadow-lg);">
            <!-- grabber -->
            <div style="width:40px;height:4px;border-radius:999px;background:var(--border);margin:0 auto 18px;"></div>

            <!-- amber warning icon -->
            <div
                style="width:64px;height:64px;border-radius:50%;background:var(--gold-container);color:#946017;display:flex;align-items:center;justify-content:center;margin:4px auto 0;">
                <svg class="ico" style="width:30px;height:30px;" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 3l9 16H3z" />
                    <path d="M12 10v4M12 17h.01" />
                </svg>
            </div>

            <h2 style="font-weight:800;font-size:20px;letter-spacing:-0.01em;margin:16px 0 0;text-align:center;">Use
                your
                linked wallet account</h2>
            <p class="muted" style="margin:8px 0 0;text-align:center;font-size:14px;line-height:1.5;">Your wallet is on
                a
                different account than the one you linked. Switch back to continue.</p>

            <!-- account rows -->
            <div style="display:flex;flex-direction:column;gap:10px;margin-top:20px;">
                <div class="card card--flat"
                    style="display:flex;align-items:center;gap:12px;padding:13px 15px;border-radius:var(--r-input);">
                    <span class="tiny"
                        style="font-weight:700;letter-spacing:0.03em;text-transform:uppercase;color:var(--text-secondary);width:54px;">Linked</span>
                    <span class="addr" style="flex:1;color:var(--primary);font-weight:600;">0x3c44…93bc</span>
                    <svg class="ico ico--sm" style="color:var(--primary);" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M5 12l4 4L19 6" />
                    </svg>
                </div>
                <div class="card card--flat"
                    style="display:flex;align-items:center;gap:12px;padding:13px 15px;border-radius:var(--r-input);border:1px solid var(--error);">
                    <span class="tiny"
                        style="font-weight:700;letter-spacing:0.03em;text-transform:uppercase;color:var(--text-secondary);width:54px;">Active</span>
                    <span class="addr" style="flex:1;color:var(--error);font-weight:700;">0x88cd…21aa</span>
                    <svg class="ico ico--sm" style="color:var(--error);" viewBox="0 0 24 24" aria-hidden="true">
                        <circle cx="12" cy="12" r="9" />
                        <path d="M15 9l-6 6M9 9l6 6" />
                    </svg>
                </div>
            </div>

            <!-- actions -->
            <button class="btn btn--primary" style="margin-top:20px;">
                <svg class="ico ico--sm" viewBox="0 0 24 24" aria-hidden="true">
                    <rect x="3" y="6" width="18" height="13" rx="3" />
                    <path d="M3 10h13a2 2 0 0 1 2 2" />
                    <path d="M16 12h2" />
                </svg>Open wallet
            </button>
            <div style="display:flex;justify-content:center;margin-top:8px;">
                <button class="btn btn--ghost" style="color:var(--text-secondary);">Cancel</button>
            </div>
        </div>
    </div>
</body>

</html>
