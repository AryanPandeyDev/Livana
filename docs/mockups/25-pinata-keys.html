<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Livana · Connect Pinata</title>
    <link rel="stylesheet" href="livana.css" />
    <style>
        body {
            background: #ECE8E1;
            display: flex;
            justify-content: center;
            padding: 24px;
        }
    </style>
</head>

<body>
    <div class="screen">
        <div class="statusbar">
            <span>9:41</span>
            <span class="statusbar__icons">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M2 17h3v3H2zM7 13h3v7H7zM12 9h3v11h-3zM17 5h3v15h-3z" />
                </svg>
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 19l9-13a14 14 0 0 0-18 0z" />
                </svg>
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <rect x="2" y="8" width="18" height="8" rx="2" fill="none" stroke="currentColor" stroke-width="2" />
                    <rect x="4" y="10" width="11" height="4" rx="1" />
                    <rect x="21" y="10" width="2" height="4" rx="1" />
                </svg>
            </span>
        </div>
        <div class="appbar">
            <button class="chip iconbtn" aria-label="Back"><svg class="ico ico--sm" viewBox="0 0 24 24"
                    aria-hidden="true">
                    <path d="M15 6l-6 6 6 6" />
                </svg></button>
            <span class="appbar__title">Connect Pinata (IPFS)</span>
            <span style="width:42px;"></span>
        </div>
        <div class="screen__scroll">
            <div class="screen__pad" style="padding-bottom:112px;">
                <!-- explainer -->
                <div class="card card--flat"
                    style="display:flex;gap:13px;align-items:flex-start;margin-top:4px;padding:16px;">
                    <span class="icochip icochip--info" style="width:38px;height:38px;border-radius:11px;"><svg
                            class="ico ico--sm" viewBox="0 0 24 24" aria-hidden="true">
                            <rect x="4" y="11" width="16" height="9" rx="2" />
                            <path d="M8 11V8a4 4 0 0 1 8 0v3" />
                        </svg></span>
                    <p class="tiny muted" style="margin:0;line-height:1.55;">Your Pinata keys upload your images and
                        documents to IPFS. They're stored securely on this device and never sent to Livana's servers.
                    </p>
                </div>
                <!-- API key -->
                <div style="margin-top:22px;">
                    <label
                        style="display:block;font:600 13px var(--font-sans);color:var(--text-secondary);margin-bottom:8px;">Pinata
                        API key</label>
                    <div class="field">
                        <input type="text" value="••••••••••••••••" readonly
                            style="font-family:var(--font-mono);letter-spacing:0.04em;color:var(--text-secondary);" />
                        <button aria-label="Show key"
                            style="all:unset;cursor:pointer;display:flex;color:var(--text-muted);">
                            <svg class="ico ico--sm" viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z" />
                                <circle cx="12" cy="12" r="3" />
                            </svg>
                        </button>
                    </div>
                </div>
                <!-- API secret -->
                <div style="margin-top:16px;">
                    <label
                        style="display:block;font:600 13px var(--font-sans);color:var(--text-secondary);margin-bottom:8px;">Pinata
                        API secret</label>
                    <div class="field">
                        <input type="text" value="••••••••••••••••••••••••" readonly
                            style="font-family:var(--font-mono);letter-spacing:0.04em;color:var(--text-secondary);" />
                        <button aria-label="Show secret"
                            style="all:unset;cursor:pointer;display:flex;color:var(--text-muted);">
                            <svg class="ico ico--sm" viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z" />
                                <circle cx="12" cy="12" r="3" />
                            </svg>
                        </button>
                    </div>
                </div>
                <!-- help link -->
                <button class="btn btn--ghost" style="margin-top:14px;gap:7px;">
                    <svg class="ico ico--sm" viewBox="0 0 24 24" aria-hidden="true">
                        <circle cx="12" cy="12" r="9" />
                        <path d="M12 11v5" />
                        <path d="M12 8h.01" />
                    </svg>Where do I find these?
                </button>
                <!-- status row -->
                <div class="card card--flat"
                    style="display:flex;align-items:center;gap:12px;margin-top:18px;padding:14px 16px;">
                    <span class="icochip"
                        style="width:36px;height:36px;border-radius:11px;background:var(--surface-alt);color:var(--text-muted);"><svg
                            class="ico ico--sm" viewBox="0 0 24 24" aria-hidden="true">
                            <circle cx="8" cy="15" r="4" />
                            <path d="M10.8 12.2L20 3" />
                            <path d="M16 7l3 3" />
                        </svg></span>
                    <div style="flex:1;">
                        <div style="font-weight:700;">Pinata keys</div>
                        <div class="tiny muted">Not set</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="dock"><button class="btn btn--primary">Save keys</button></div>
    </div>
</body>

</html>
