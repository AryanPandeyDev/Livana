<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Livana · Settings</title>
    <link rel="stylesheet" href="livana.css" />
    <style>
        body {
            background: #ECE8E1;
            display: flex;
            justify-content: center;
            padding: 24px;
        }

        .toggle {
            width: 44px;
            height: 26px;
            border-radius: 999px;
            background: var(--border);
            position: relative;
            flex: none;
            border: none;
            cursor: pointer;
            transition: background-color .2s ease;
        }

        .toggle__knob {
            position: absolute;
            top: 3px;
            left: 3px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--surface);
            box-shadow: var(--shadow-sm);
            transition: left .2s ease;
        }

        .toggle--on {
            background: var(--primary);
        }

        .toggle--on .toggle__knob {
            left: 21px;
        }

        .grouplabel {
            font: 700 12px/1 var(--font-sans);
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin: 22px 0 10px 4px;
        }

        .setrow {
            display: flex;
            align-items: center;
            gap: 13px;
            width: 100%;
            background: none;
            border: none;
            cursor: pointer;
            padding: 15px 0;
            text-align: left;
            color: var(--text);
            font: inherit;
        }

        .setrow__label {
            flex: 1;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div class="screen">
        <div class="statusbar">
            <span>9:41</span>
            <span class="statusbar__icons">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M2 17h3v3H2zM7 13h3v7H7zM12 9h3v11h-3zM17 5h3v15h-3z" />
                </svg>
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 19l9-13a14 14 0 0 0-18 0z" />
                </svg>
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <rect x="2" y="8" width="18" height="8" rx="2" fill="none" stroke="currentColor" stroke-width="2" />
                    <rect x="4" y="10" width="11" height="4" rx="1" />
                    <rect x="21" y="10" width="2" height="4" rx="1" />
                </svg>
            </span>
        </div>
        <div class="appbar">
            <button class="chip iconbtn" aria-label="Back"><svg class="ico ico--sm" viewBox="0 0 24 24"
                    aria-hidden="true">
                    <path d="M15 6l-6 6 6 6" />
                </svg></button>
            <span class="appbar__title">Settings</span>
            <span style="width:42px;"></span>
        </div>
        <div class="screen__scroll">
            <div class="screen__pad" style="padding-bottom:32px;">
                <!-- Account -->
                <div class="grouplabel">Account</div>
                <div class="card" style="padding:4px 16px;">
                    <button class="setrow">
                        <span class="icochip icochip--jade" style="width:38px;height:38px;border-radius:12px;"><svg
                                class="ico ico--sm" viewBox="0 0 24 24" aria-hidden="true">
                                <circle cx="12" cy="8" r="4" />
                                <path d="M4 21c0-4 3.5-6 8-6s8 2 8 6" />
                            </svg></span>
                        <span class="setrow__label">Manage account</span>
                        <svg class="ico ico--sm" style="color:var(--text-muted);" viewBox="0 0 24 24"
                            aria-hidden="true">
                            <path d="M9 6l6 6-6 6" />
                        </svg>
                    </button>
                </div>
                <!-- Wallet -->
                <div class="grouplabel">Wallet</div>
                <div class="card" style="padding:4px 16px;">
                    <button class="setrow">
                        <span class="icochip icochip--info" style="width:38px;height:38px;border-radius:12px;"><svg
                                class="ico ico--sm" viewBox="0 0 24 24" aria-hidden="true">
                                <rect x="3" y="6" width="18" height="13" rx="3" />
                                <path d="M16 12h2" />
                            </svg></span>
                        <span class="setrow__label">Re-link wallet</span>
                        <svg class="ico ico--sm" style="color:var(--text-muted);" viewBox="0 0 24 24"
                            aria-hidden="true">
                            <path d="M9 6l6 6-6 6" />
                        </svg>
                    </button>
                    <hr class="divider" />
                    <button class="setrow">
                        <span class="icochip"
                            style="width:38px;height:38px;border-radius:12px;background:var(--surface-alt);color:var(--text-secondary);"><svg
                                class="ico ico--sm" viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M15 12H4" />
                                <path d="M8 8l-4 4 4 4" />
                                <path d="M14 4h4a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2h-4" />
                            </svg></span>
                        <span class="setrow__label">Disconnect wallet</span>
                        <svg class="ico ico--sm" style="color:var(--text-muted);" viewBox="0 0 24 24"
                            aria-hidden="true">
                            <path d="M9 6l6 6-6 6" />
                        </svg>
                    </button>
                </div>
                <!-- NGO -->
                <div class="grouplabel">NGO</div>
                <div class="card" style="padding:4px 16px;">
                    <button class="setrow">
                        <span class="icochip icochip--gold" style="width:38px;height:38px;border-radius:12px;"><svg
                                class="ico ico--sm" viewBox="0 0 24 24" aria-hidden="true">
                                <circle cx="8" cy="15" r="3.2" />
                                <path d="M10.2 12.8L20 3" />
                                <path d="M16 7l3 3" />
                            </svg></span>
                        <span class="setrow__label">Pinata API keys</span>
                        <span class="muted tiny">Not set</span>
                        <svg class="ico ico--sm" style="color:var(--text-muted);margin-left:8px;" viewBox="0 0 24 24"
                            aria-hidden="true">
                            <path d="M9 6l6 6-6 6" />
                        </svg>
                    </button>
                </div>
                <!-- Preferences -->
                <div class="grouplabel">Preferences</div>
                <div class="card" style="padding:4px 16px;">
                    <div class="setrow" style="cursor:default;">
                        <span class="icochip icochip--jade" style="width:38px;height:38px;border-radius:12px;"><svg
                                class="ico ico--sm" viewBox="0 0 24 24" aria-hidden="true">
                                <rect x="4" y="10" width="16" height="10" rx="2" />
                                <path d="M8 10V7a4 4 0 0 1 8 0v3" />
                            </svg></span>
                        <span class="setrow__label">Clear Pinata keys when I sign out</span>
                        <button class="toggle toggle--on" role="switch" aria-checked="true"
                            aria-label="Clear Pinata keys when I sign out">
                            <span class="toggle__knob"></span>
                        </button>
                    </div>
                </div>
                <!-- About -->
                <div class="grouplabel">About</div>
                <div class="card" style="padding:4px 16px;">
                    <div class="setrow" style="cursor:default;">
                        <span class="setrow__label">Network</span>
                        <span class="muted">Local · Anvil</span>
                    </div>
                    <hr class="divider" />
                    <div class="setrow" style="cursor:default;">
                        <span class="setrow__label">Version</span>
                        <span class="muted">1.0.0</span>
                    </div>
                    <hr class="divider" />
                    <button class="setrow">
                        <span class="setrow__label">Terms</span>
                        <svg class="ico ico--sm" style="color:var(--text-muted);" viewBox="0 0 24 24"
                            aria-hidden="true">
                            <path d="M9 6l6 6-6 6" />
                        </svg>
                    </button>
                    <hr class="divider" />
                    <button class="setrow">
                        <span class="setrow__label">Privacy</span>
                        <svg class="ico ico--sm" style="color:var(--text-muted);" viewBox="0 0 24 24"
                            aria-hidden="true">
                            <path d="M9 6l6 6-6 6" />
                        </svg>
                    </button>
                </div>
                <!-- Sign out -->
                <div class="card" style="padding:4px 16px;margin-top:22px;">
                    <button class="setrow" style="color:var(--error);font-weight:700;">
                        <span class="icochip"
                            style="width:38px;height:38px;border-radius:12px;background:var(--secondary-container);color:var(--error);"><svg
                                class="ico ico--sm" viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M15 12H4" />
                                <path d="M8 8l-4 4 4 4" />
                                <path d="M14 4h4a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2h-4" />
                            </svg></span>
                        <span style="flex:1;">Sign out</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
