<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Livana · Donate</title>
    <link rel="stylesheet" href="livana.css" />
    <style>
        body {
            background: #ECE8E1;
            display: flex;
            justify-content: center;
            padding: 24px;
        }

        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
            margin-top: 8px;
        }

        .keypad button {
            height: 52px;
            background: none;
            border: none;
            font: 600 22px var(--font-sans);
            color: var(--text);
            border-radius: 14px;
            cursor: pointer;
            transition: background-color .15s ease;
        }

        .keypad button:hover {
            background: var(--surface-alt);
        }

        .keypad button:active {
            background: #E7E2D9;
        }
    </style>
</head>

<body>
    <div class="screen">
        <div class="statusbar">
            <span>9:41</span>
            <span class="statusbar__icons">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M2 17h3v3H2zM7 13h3v7H7zM12 9h3v11h-3zM17 5h3v15h-3z" />
                </svg>
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 19l9-13a14 14 0 0 0-18 0z" />
                </svg>
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <rect x="2" y="8" width="18" height="8" rx="2" fill="none" stroke="currentColor" stroke-width="2" />
                    <rect x="4" y="10" width="11" height="4" rx="1" />
                    <rect x="21" y="10" width="2" height="4" rx="1" />
                </svg>
            </span>
        </div>
        <div class="appbar">
            <button class="chip iconbtn" aria-label="Back"><svg class="ico ico--sm" viewBox="0 0 24 24"
                    aria-hidden="true">
                    <path d="M15 6l-6 6 6 6" />
                </svg></button>
            <span class="appbar__title">Donate</span>
            <span style="width:42px;"></span>
        </div>
        <div class="screen__scroll">
            <div class="screen__pad">
                <!-- cause mini -->
                <div class="card card--flat"
                    style="display:flex;align-items:center;gap:12px;padding:12px;margin-top:4px;">
                    <span class="cover" style="width:48px;height:48px;border-radius:12px;flex:none;"><img
                            src="https://picsum.photos/seed/livana-flood/100/100" alt=""
                            onerror="this.remove()" /></span>
                    <div style="flex:1;">
                        <div style="font-weight:700;">Flood Relief Fund</div>
                        <div class="tiny muted">Clean Water Foundation · South Asia</div>
                    </div>
                </div>
                <!-- amount -->
                <div style="text-align:center;padding:30px 0 12px;position:relative;">
                    <div
                        style="position:absolute;inset:0;background:radial-gradient(60% 60% at 50% 45%,rgba(15,118,110,0.07),transparent 70%);pointer-events:none;">
                    </div>
                    <div class="tiny muted" style="font-weight:600;letter-spacing:0.06em;text-transform:uppercase;">
                        You're giving</div>
                    <div class="metric" style="font-size:58px;color:var(--text);margin-top:8px;">$50<span
                            style="opacity:.4;font-weight:400;">|</span></div>
                    <div class="muted" style="font-weight:600;letter-spacing:0.04em;margin-top:4px;">USDC</div>
                </div>
                <!-- quick chips -->
                <div style="display:flex;gap:10px;justify-content:center;">
                    <button class="chip">$10</button>
                    <button class="chip chip--on">$50</button>
                    <button class="chip">$100</button>
                    <button class="chip">$250</button>
                </div>
                <!-- balance -->
                <div
                    style="display:flex;align-items:center;justify-content:center;gap:7px;margin-top:20px;color:var(--text-secondary);">
                    <svg class="ico ico--sm" viewBox="0 0 24 24" aria-hidden="true">
                        <rect x="3" y="6" width="18" height="13" rx="3" />
                        <path d="M3 10h18" />
                    </svg>
                    <span class="tiny">Your balance: <strong style="color:var(--text);">$320.00</strong></span>
                </div>
                <!-- two-step note -->
                <div class="card card--flat"
                    style="display:flex;align-items:center;gap:12px;margin-top:18px;padding:14px 16px;">
                    <span class="icochip icochip--jade" style="width:36px;height:36px;border-radius:11px;"><svg
                            class="ico ico--sm" viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M5 12l4 4L19 6" />
                        </svg></span>
                    <p class="tiny muted" style="margin:0;line-height:1.45;">Two quick steps: <strong
                            style="color:var(--text);">approve USDC</strong>, then <strong
                            style="color:var(--text);">confirm</strong> your donation. Funds go straight to on-chain
                        escrow.</p>
                </div>
            </div>
        </div>
        <div class="dock"><button class="btn btn--primary">Continue</button></div>
    </div>
</body>

</html>
