# =============================================
# Livana Backend — Application Properties
# =============================================

spring.application.name=livana-backend

# --- Database ---
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/livana}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --- Flyway ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# --- Server ---
server.port=8080

# --- Multipart upload limits ---
# Aligned with ImageValidator.MAX_BYTES (5 MB) for pool cover image uploads.
# Request size is slightly larger than file size to leave room for multipart
# boundaries and headers — a 5 MB file just barely valid by ImageValidator
# would otherwise be rejected by the framework before reaching our validator.
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB

# --- Clerk Auth ---
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=https://daring-jay-45.clerk.accounts.dev/.well-known/jwks.json
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://daring-jay-45.clerk.accounts.dev

# Clerk Backend API secret key (sk_...) for server-to-server calls.
# Required for verifying NGO official email addresses.
# Set via CLERK_SECRET_KEY env var. Never log this value.
clerk.secret-key=${CLERK_SECRET_KEY:}

# --- Logging ---
logging.level.org.flywaydb=DEBUG
logging.level.com.livana.backend=DEBUG

# --- Blockchain Event Indexer ---
# Disabled by default — enable when an RPC node is available
livana.indexer.enabled=${INDEXER_ENABLED:false}
livana.indexer.rpc-url=${RPC_URL:http://127.0.0.1:8545}
livana.indexer.factory-address=${FACTORY_ADDRESS:0xe7f1725E7734CE288F8367e1Bb143E90bb3F0512}
livana.indexer.sbt-address=${SBT_ADDRESS:0xCafac3dD18aC6c6e92c921884f9E4176737C052c}
livana.indexer.poll-interval-ms=3000
livana.indexer.batch-size=2000
livana.indexer.confirmations=${INDEXER_CONFIRMATIONS:0}
livana.indexer.ipfs-gateway-url=${IPFS_GATEWAY_URL:https://gateway.pinata.cloud/ipfs/}

# --- AI Screening Service ---
ai-screening.base-url=${AI_SCREENING_BASE_URL:http://localhost:8000}
ai-screening.shared-secret=${AI_SCREENING_SHARED_SECRET:}
ai-screening.callback-timeout-seconds=${AI_SCREENING_CALLBACK_TIMEOUT_SECONDS:120}

# --- AI Config Encryption ---
# Base64-encoded 256-bit AES key for encrypting the Gemini API key at rest.
ai-config.encryption-key=${AI_CONFIG_ENCRYPTION_KEY:}
