# =============================================
# Test-only overrides
# =============================================
# H2 in PostgreSQL compatibility mode — supports JSONB, UUID, etc.
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Let Hibernate create schema from entity annotations (Flyway disabled)
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false

# Suppress noisy indexer/blockchain beans in @DataJpaTest slices
livana.indexer.enabled=false
livana.indexer.rpc-url=http://localhost:8545
livana.indexer.factory-address=0x0000000000000000000000000000000000000000
livana.indexer.sbt-address=0x0000000000000000000000000000000000000000
livana.indexer.ipfs-gateway-url=http://localhost/ipfs/

# Stub JWT config so Spring Security doesn't fail on context load
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=https://localhost/.well-known/jwks.json
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://localhost
